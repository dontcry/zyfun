name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.0.0)'
        required: true
        default: 'v1.0.0'
      platform:
        description: 'Build platform'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - windows
          - mac
          - linux
  push:
    tags:
      - v*.*.*

  pull_request_target:
    branches:
      - main
    types:
      - closed

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
      version: ${{ steps.tag.outputs.version }}
    steps:
      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAG="${{ inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

  build:
    needs:
      - prepare
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        include:
          - os: macos-latest
            platform: mac
            arch: arm64
            build_command: pnpm build:mac:arm64

          - os: macos-15-intel
            platform: mac
            arch: x64
            build_command: pnpm build:mac:x64

          - os: windows-latest
            platform: win
            arch: x64
            build_command: pnpm build:win:x64

          - os: windows-11-arm
            platform: win
            arch: arm64
            build_command: pnpm build:win:arm64

          - os: ubuntu-latest
            platform: linux
            arch: x64
            build_command: pnpm build:linux:x64

          - os: ubuntu-24.04-arm
            platform: linux
            arch: arm64
            build_command: pnpm build:linux:arm64
      fail-fast: false

    if: |
      inputs.platform == 'all' ||
      (inputs.platform == 'windows' && startsWith(matrix.platform, 'win')) ||
      (inputs.platform == 'mac' && matrix.platform == 'mac')) ||
      (inputs.platform == 'linux' && matrix.platform == 'linux')) ||
      github.event_name == 'push'

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.head.sha || '' }}

      - name: Set version
        shell: bash
        run: |
          npm version "${{ needs.prepare.outputs.version }}" --no-git-tag-version --allow-same-version

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.node-version'

      - name: Install pnpm
        uses: pnpm/action-setup@v5

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_OUTPUT

      - name: Cache pnpm dependencies
        uses: actions/cache@v5
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-${{ runner.arch }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-${{ runner.arch }}-pnpm-

      - name: Install Dependencies
        run: pnpm install

      - name: Install macOS deps
        if: matrix.platform == 'mac'
        run: brew install python-setuptools

      - name: Install Linux deps
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y rpm libevdev-dev libxtst-dev libx11-dev libxfixes-dev libwayland-dev

      - name: Prepare env file
        shell: bash
        run: cp -f .env.example .env

      - name: Build
        shell: bash
        run: ${{ matrix.build_command }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_OPTIONS: --max-old-space-size=8192

      - name: Rename windows build info file
        if: matrix.platform == 'win'
        shell: bash
        run: |
          set -e

          if [[ "${{ matrix.arch }}" == "arm64" ]]; then
            if [[ -f dist/latest.yml ]]; then
              mv dist/latest.yml dist/latest-win-arm64.yml
            fi
          fi

          if [[ "${{ matrix.arch }}" == "x64" ]]; then
            if [[ -f dist/latest.yml ]]; then
              mv dist/latest.yml dist/latest-win-x64.yml
            fi
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: zyfun-${{ matrix.platform }}-${{ matrix.arch }}
          path: dist/**
          if-no-files-found: ignore
          retention-days: 1
          compression-level: 8

  publish:
    needs:
      - prepare
      - build
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Merge Windows latest.yml
        if: hashFiles('dist/latest-win-x64.yml') != '' && hashFiles('dist/latest-win-arm64.yml') != ''
        shell: bash
        run: |
          set -e

          sudo wget https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64 -O /usr/local/bin/yq
          sudo chmod +x /usr/local/bin/yq

          WIN_X64="dist/latest-win-x64.yml"
          WIN_ARM="dist/latest-win-arm64.yml"

          # case 1: both exist → merge
          if [[ -f "$WIN_X64" && -f "$WIN_ARM" ]]; then
            echo "Merging Windows updater files"

            yq eval-all '
              select(fileIndex == 0) as $x64 |
              select(fileIndex == 1) as $arm |
              $x64 |
              .files = (($x64.files // []) + ($arm.files // []))
            ' "$WIN_X64" "$WIN_ARM" > dist/latest-windows.yml

            rm -f "$WIN_X64" "$WIN_ARM"
            exit 0
          fi

          # case 2: only x64
          if [[ -f "$WIN_X64" ]]; then
            echo "Only windows x64 updater found"
            mv "$WIN_X64" dist/latest-windows.yml
            exit 0
          fi

          # case 3: only arm64
          if [[ -f "$WIN_ARM" ]]; then
            echo "Only windows arm64 updater found"
            mv "$WIN_ARM" dist/latest-windows.yml
            exit 0
          fi

          echo "No Windows updater files found"

      - name: Release
        uses: ncipollo/release-action@v1
        with:
          draft: true
          allowUpdates: true
          makeLatest: false
          tag: ${{ needs.prepare.outputs.tag }}
          artifacts: 'dist/*.exe,dist/*.dmg,dist/*.AppImage,dist/*.deb,dist/*.rpm,dist/latest*.yml'
          token: ${{ secrets.GITHUB_TOKEN }}
